<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unmatched</title>
  <style>
    :root { --bg: #0f0f1a; --card: #1a1a2e; --text: #e0e0e0; --muted: #888; --accent: #818cf8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding: 2rem 1rem; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { max-width: 420px; text-align: center; }
    h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 0.5rem; }
    .tagline { color: var(--muted); font-size: 1.1rem; margin-bottom: 2.5rem; }
    .links { display: flex; flex-direction: column; gap: 1rem; }
    .links a { display: block; background: var(--card); color: var(--text); text-decoration: none; padding: 1rem 1.5rem; border-radius: 12px; font-size: 1.1rem; transition: background 0.2s; }
    .links a:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Unmatched</h1>
    <p class="tagline">A card-matching memory game</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms-of-service.html">Terms of Service</a>
      <a href="support.html">Support</a>
    </div>
  </div>
</body>
</html>
